<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page Not Found — ScholarLens</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    // GitHub Pages SPA redirect trick:
    // Preserve the original path in sessionStorage so the app can restore it
    const path = window.location.pathname + window.location.search;
    sessionStorage.setItem('gh_redirect', path);
    // Small delay so the user sees the message, then go home
    setTimeout(() => { window.location.replace('/'); }, 2500);
  </script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg,#f8fafc);">
  <div style="text-align:center;max-width:400px;padding:40px 24px;">
    <div style="font-size:4rem;margin-bottom:20px;">🎓</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;margin-bottom:10px;">Page not found</h1>
    <p style="color:#71717a;margin-bottom:24px;">Redirecting you to ScholarLens…</p>
    <a href="/" style="display:inline-block;padding:12px 24px;background:#16a34a;color:#fff;border-radius:12px;font-weight:600;text-decoration:none;">Go to ScholarLens →</a>
  </div>
</body>
</html>
